<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publications (Dynamic)</title>
<style>
  .publications-page {
    --surface: rgba(255, 252, 247, 0.9);
    --surface-strong: #fffdf9;
    --ink: #1e2430;
    --muted: #5a6473;
    --line: rgba(48, 62, 84, 0.12);
    --accent-soft: rgba(175, 63, 38, 0.12);
    --accent-deep: #7a2619;
    --sage: #28594f;
    --shadow: 0 18px 35px rgba(36, 25, 14, 0.08);
    --radius: 24px;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
    font-family: "Open Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    text-align: left;
  }

  .publications-page * {
    box-sizing: border-box;
  }

  .publications-page a {
    color: inherit;
    text-decoration: none;
  }

  .publications-page p {
    margin: 0;
  }

  .publications-page .page-shell {
    width: min(1240px, 100%);
    margin: 0 auto;
    padding: 4px 0 48px;
  }

  .publications-page .home-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.95);
    color: var(--ink);
    font-weight: 700;
    font-size: 0.95rem;
    white-space: nowrap;
  }

  .publications-page .home-link:hover {
    border-color: rgba(175, 63, 38, 0.3);
    background: rgba(175, 63, 38, 0.08);
    color: var(--accent-deep);
  }

  .publications-page .toolbar {
    position: sticky;
    top: 16px;
    z-index: 10;
    margin: 0 0 24px;
    padding: 18px;
    border-radius: 24px;
    background-image: linear-gradient(rgba(255, 250, 243, 0.2), rgba(255, 250, 243, 0.2)), url("img/louis-livres.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 1px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
  }

  .publications-page .search-row {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
  }

  .publications-page .search-input {
    width: 100%;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.94);
    color: var(--ink);
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }

  .publications-page .search-input:focus {
    border-color: rgba(175, 63, 38, 0.45);
    transform: translateY(-1px);
  }

  .publications-page .ghost-button {
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.94);
    color: var(--ink);
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  .publications-page .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .publications-page .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.8);
    color: var(--ink);
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }

  .publications-page .filter-chip span {
    display: inline-grid;
    place-items: center;
    min-width: 24px;
    padding: 2px 6px;
    border-radius: 999px;
    background: rgba(40, 89, 79, 0.1);
    color: var(--sage);
    font-size: 0.82rem;
  }

  .publications-page .filter-chip:hover,
  .publications-page .filter-chip.active {
    transform: translateY(-1px);
    border-color: rgba(175, 63, 38, 0.3);
  }

  .publications-page .filter-chip.active {
    background: rgba(175, 63, 38, 0.12);
    color: var(--accent-deep);
  }

  .publications-page .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 18px 2px 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .publications-page .source-warning {
    display: none;
    margin: 14px 0 0;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1px solid rgba(175, 63, 38, 0.35);
    background: rgba(175, 63, 38, 0.12);
    color: #612116;
    font-size: 0.93rem;
    font-weight: 700;
  }

  .publications-page .source-warning.visible {
    display: block;
  }

  .publications-page .year-section {
    margin-top: 28px;
    padding: 24px;
    border-radius: 28px;
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: 0 20px 40px rgba(51, 38, 19, 0.06);
  }

  .publications-page .year-heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }

  .publications-page .year-heading h2 {
    margin: 0;
    font-family: inherit;
    font-size: clamp(1.8rem, 2.2vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .publications-page .year-heading p {
    margin: 0;
    color: var(--muted);
  }

  .publications-page .publication-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
  }

  .publications-page .publication-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 100%;
    padding: 18px 64px 18px 18px;
    border-radius: var(--radius);
    background: var(--surface-strong);
    border: 1px solid rgba(50, 65, 88, 0.08);
    box-shadow: 0 16px 34px rgba(52, 38, 20, 0.06);
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    position: relative;
  }

  .publications-page .publication-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 24px 40px rgba(52, 38, 20, 0.1);
  }

  .publications-page .publication-card[hidden] {
    display: none;
  }

  .publications-page .publication-card h3 {
    margin: 0;
    font-family: inherit;
    font-size: 1.12rem;
    line-height: 1.2;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .publications-page .publication-card h3 a {
    text-decoration: underline;
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.14em;
    text-decoration-color: rgba(175, 63, 38, 0.35);
  }

  .publications-page .authors,
  .publications-page .citation-line {
    margin: 0;
  }

  .publications-page .authors {
    color: #2e3541;
    font-size: 0.98rem;
  }

  .publications-page .citation-line {
    color: var(--sage);
    font-weight: 700;
    font-size: 0.93rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .publications-page .me {
    font-weight: 800;
    color: var(--accent-deep);
  }

  .publications-page .citation-line a {
    color: inherit;
    text-decoration: underline;
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.14em;
    text-decoration-color: rgba(175, 63, 38, 0.35);
  }

  .publications-page .bibtex-details {
    margin-top: 2px;
  }

  .publications-page .bibtex-summary {
    position: absolute;
    top: 14px;
    right: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.9);
    color: var(--accent-deep);
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.01em;
    cursor: pointer;
    list-style: none;
  }

  .publications-page .bibtex-summary::-webkit-details-marker {
    display: none;
  }

  .publications-page .bibtex-box {
    margin-top: 8px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.74);
  }

  .publications-page .copy-bibtex {
    display: inline-flex;
    align-items: center;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
  }

  .publications-page .bibtex-code {
    margin: 8px 0 0;
    max-height: 240px;
    overflow: auto;
    white-space: pre-wrap;
    font-size: 0.82rem;
    line-height: 1.45;
    color: #273142;
  }

  .publications-page .empty-state {
    display: none;
    margin-top: 22px;
    padding: 36px 28px;
    text-align: center;
    border-radius: 28px;
    border: 1px dashed rgba(50, 65, 88, 0.18);
    background: rgba(255, 252, 247, 0.8);
    color: var(--muted);
  }

  .publications-page .loading-state {
    margin-top: 22px;
    padding: 24px 28px;
    border-radius: 18px;
    border: 1px solid rgba(50, 65, 88, 0.15);
    background: rgba(255, 252, 247, 0.8);
    color: var(--muted);
  }

  .publications-page .footer-note {
    margin-top: 26px;
    color: var(--muted);
    text-align: right;
    font-size: 0.88rem;
  }

  .publications-page kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(50, 65, 88, 0.14);
    background: rgba(255, 255, 255, 0.84);
    color: var(--ink);
    font-size: 0.82rem;
    font-family: inherit;
    font-weight: 700;
  }

  @media (max-width: 940px) {
    .publications-page .publication-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    .publications-page .page-shell {
      padding-top: 0;
    }

    .publications-page .year-section {
      padding: 22px;
    }

    .publications-page .toolbar {
      top: 10px;
    }

    .publications-page .search-row,
    .publications-page .year-heading,
    .publications-page .status-row {
      grid-template-columns: 1fr;
      display: grid;
      justify-content: unset;
    }
  }
</style>
</head>
<body>
<div class="publications-page">
  <main class="page-shell">
    <section class="toolbar" aria-label="Publication filters">
      <div class="search-row">
        <a class="home-link" href="https://www.gpeyre.com/">Home</a>
        <input id="search-input" class="search-input" type="search" placeholder="Search publications, authors, venues, years, or arXiv..." disabled>
        <button id="clear-search" class="ghost-button" type="button" disabled>Clear</button>
      </div>
      <div id="filter-row" class="filter-row"></div>
      <div class="status-row">
        <span id="status-text">Loading publications...</span>
        <span>Tip: press <kbd>/</kbd> to focus search</span>
      </div>
      <p id="source-warning" class="source-warning" role="status" aria-live="polite"></p>
    </section>

    <div id="loading-state" class="loading-state">Loading BibTeX files and building the publication list...</div>

    <div id="empty-state" class="empty-state">
      No publication matches the current filters. Try a broader keyword or switch back to <strong>All</strong>.
    </div>

    <div id="publications-root"></div>
    <p class="footer-note" id="footer-note"></p>
  </main>
</div>

      return (text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function asciiFold(text) {
      return (text || "").normalize("NFKD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function stripOuterBraces(text) {
      let result = (text || "").trim();
      while (result.startsWith("{") && result.endsWith("}")) {
        let depth = 0;
        let valid = true;
        for (let i = 0; i < result.length; i += 1) {
          if (result[i] === "{") {
            depth += 1;
          } else if (result[i] === "}") {
            depth -= 1;
            if (depth === 0 && i !== result.length - 1) {
              valid = false;
              break;
            }
          }
        }
        if (!valid) {
          break;
        }
        result = result.slice(1, -1).trim();
      }
      return result;
    }

    function applyAccent(accent, letter) {
      const combiner = ACCENT_COMBINERS[accent];
      if (!combiner) {
        return letter;
      }
      return `${letter}${combiner}`.normalize("NFC");
    }

        result = result.split(latex).join(plain);
      });
      result = result.replace(/\{\\([`'"^~=.ckuvHrbd])\s*\{?([A-Za-z])\}?\}/g, (_, accent, letter) => applyAccent(accent, letter));
      result = result.replace(/\\([`'"^~=.ckuvHrbd])\s*\{?([A-Za-z])\}?/g, (_, accent, letter) => applyAccent(accent, letter));
      result = result.replace(/\\[A-Za-z]+\s*/g, " ");
      result = result.replace(/[{}]/g, "");
      result = result.replace(/~/g, " ");
      return collapseWhitespace(result);
    }

    function parseBibtexEntries(content) {
      const entries = [];
      let index = 0;
      while (index < content.length) {
        const start = content.indexOf("@", index);
        if (start === -1) {
          break;
        }
        let cursor = start + 1;
        while (cursor < content.length && /\s/.test(content[cursor])) {
          cursor += 1;
        }
        const typeStart = cursor;
        while (cursor < content.length && /[A-Za-z0-9_-]/.test(content[cursor])) {
          cursor += 1;
        }
        const entryType = content.slice(typeStart, cursor).trim().toLowerCase();
        if (!entryType) {
          index = start + 1;
          continue;
        }
        while (cursor < content.length && /\s/.test(content[cursor])) {
          cursor += 1;
        }
        if (cursor >= content.length || !["{", "("].includes(content[cursor])) {
          index = cursor + 1;
          continue;
        }
        const opening = content[cursor];
        const closing = opening === "{" ? "}" : ")";
        cursor += 1;

        const keyStart = cursor;
        let depth = 0;
        let inQuote = false;
        while (cursor < content.length) {
          const ch = content[cursor];
          const prev = cursor > 0 ? content[cursor - 1] : "";
          if (ch === '"' && prev !== "\\") {
            inQuote = !inQuote;
          } else if (!inQuote) {
            if (ch === opening) {
              depth += 1;
            } else if (ch === closing) {
              if (depth === 0) {
                break;
              }
              depth -= 1;
            } else if (ch === "," && depth === 0) {
              break;
            }
          }
          cursor += 1;
        }
        const key = content.slice(keyStart, cursor).trim();
        if (cursor >= content.length || content[cursor] !== ",") {
          index = cursor + 1;
          continue;
        }
        cursor += 1;
        const bodyStart = cursor;
        depth = 0;
        inQuote = false;
        while (cursor < content.length) {
          const ch = content[cursor];
          const prev = cursor > 0 ? content[cursor - 1] : "";
          if (ch === '"' && prev !== "\\") {
            inQuote = !inQuote;
          } else if (!inQuote) {
            if (ch === opening) {
              depth += 1;
            } else if (ch === closing) {
              if (depth === 0) {
                const body = content.slice(bodyStart, cursor);
                entries.push({
                  entryType,
                  key,
                  fields: parseBibtexFields(body),
                  raw: content.slice(start, cursor + 1),
                });
                cursor += 1;
                break;
              }
              depth -= 1;
            }
          }
          cursor += 1;
        }
        index = cursor;
      }
      return entries;
    }

    function parseBibtexFields(body) {
      const fields = {};
      let cursor = 0;
      while (cursor < body.length) {
        while (cursor < body.length && /[\s,]/.test(body[cursor])) {
          cursor += 1;
        }
        if (cursor >= body.length) {
          break;
        }
        const nameStart = cursor;
        while (cursor < body.length && /[A-Za-z0-9_-]/.test(body[cursor])) {
          cursor += 1;
        }
        const fieldName = body.slice(nameStart, cursor).trim().toLowerCase();
        if (!fieldName) {
          cursor += 1;
          continue;
        }
        while (cursor < body.length && /\s/.test(body[cursor])) {
          cursor += 1;
        }
        if (cursor >= body.length || body[cursor] !== "=") {
          while (cursor < body.length && body[cursor] !== ",") {
            cursor += 1;
          }
          continue;
        }
        cursor += 1;
        while (cursor < body.length && /\s/.test(body[cursor])) {
          cursor += 1;
        }
        if (cursor >= body.length) {
          break;
        }
        const parsed = parseBibtexValue(body, cursor);
        fields[fieldName] = parsed.value.trim();
        cursor = parsed.cursor;
        while (cursor < body.length && /\s/.test(body[cursor])) {
          cursor += 1;
        }
        if (cursor < body.length && body[cursor] === ",") {
          cursor += 1;
        }
      }
      return fields;
    }

    function parseBibtexValue(body, startCursor) {
      let cursor = startCursor;
      if (body[cursor] === "{") {
        let depth = 0;
        const start = cursor + 1;
        cursor += 1;
        while (cursor < body.length) {
          if (body[cursor] === "{") {
            depth += 1;
          } else if (body[cursor] === "}") {
            if (depth === 0) {
              return { value: body.slice(start, cursor), cursor: cursor + 1 };
            }
            depth -= 1;
          }
          cursor += 1;
        }
        return { value: body.slice(start), cursor };
      }
      if (body[cursor] === '"') {
        const start = cursor + 1;
        cursor += 1;
        while (cursor < body.length) {
          if (body[cursor] === '"' && body[cursor - 1] !== "\\") {
            return { value: body.slice(start, cursor), cursor: cursor + 1 };
          }
          cursor += 1;
        }
        return { value: body.slice(start), cursor };
      }
      const start = cursor;
      while (cursor < body.length && ![",", "\n", "\r"].includes(body[cursor])) {
        cursor += 1;
      }
      return { value: body.slice(start, cursor), cursor };
    }

    function normalizeUrl(url) {
      const clean = collapseWhitespace(url);
      if (clean.startsWith("ttps://")) {
        return `h${clean}`;
      }
      if (clean.startsWith("ttp://")) {
        return `h${clean}`;
      }
      return clean;
    }

    function normalizeDoi(doi, url) {
      const clean = collapseWhitespace(doi);
      if (!clean) {
        return { doi: "", doiUrl: "" };
      }
      if (clean.startsWith("http://") || clean.startsWith("https://")) {
        return { doi: clean, doiUrl: clean };
      }
      if (/^10\.\S+$/.test(clean)) {
        return { doi: clean, doiUrl: `https://doi.org/${clean}` };
      }
      if (/^\d{4}\.\d{4,5}(v\d+)?$/.test(clean) && !url.includes("arxiv.org")) {
        return { doi: clean, doiUrl: `https://arxiv.org/abs/${clean}` };
      }
      return { doi: clean, doiUrl: "" };
    }

    function extractArxivId(text) {
      const clean = collapseWhitespace(text);
      if (!clean) {
        return "";
      }
      const idMatch = clean.match(/\b(\d{4}\.\d{4,5}(v\d+)?)\b/i);
      if (idMatch) {
        return idMatch[1];
      }
      const absMatch = clean.match(/arxiv\.org\/abs\/([^/?#\s]+)/i);
      if (absMatch) {
        return absMatch[1];
      }
      return "";
    }

    function parseAuthors(raw) {
      return (raw || "")
        .split(/\s+and\s+/i)
        .map((name) => latexToUnicode(name))
        .filter((name) => name.trim().length > 0);
    }

    function formatAuthors(authors) {
      if (!authors.length) {
        return "";
      }
      if (authors.length === 1) {
        return authors[0];
      }
      if (authors.length === 2) {
        return `${authors[0]} and ${authors[1]}`;
      }
      return `${authors.slice(0, -1).join(", ")}, and ${authors[authors.length - 1]}`;
    }

    function renderAuthors(authors) {
      const escaped = authors.map((name) => {
        const text = escapeHtml(name);
        return asciiFold(name).includes("peyr") ? `<span class="me">${text}</span>` : text;
      });
      if (!escaped.length) {
        return "";
      }
      if (escaped.length === 1) {
        return escaped[0];
      }
      if (escaped.length === 2) {
        return `${escaped[0]} and ${escaped[1]}`;
      }
      return `${escaped.slice(0, -1).join(", ")}, and ${escaped[escaped.length - 1]}`;
    }

    function buildVenue(fields, fallbackLabel) {
      const venue = latexToUnicode(
        fields.journal ||
          fields.booktitle ||
          fields.chapter ||
          fields.publisher ||
          fields.institution ||
          fallbackLabel
      );
      const details = [];
      const volume = latexToUnicode(fields.volume || "");
      const number = latexToUnicode(fields.number || "");
      if (volume && number) {
        details.push(`${volume}(${number})`);
      } else if (volume) {
        details.push(volume);
      } else if (number) {
        details.push(`(${number})`);
      }
      if (fields.pages) {
        details.push(latexToUnicode(fields.pages).replace(/--/g, "-"));
      }
      if (!details.length && fields.publisher) {
        const publisher = latexToUnicode(fields.publisher);
        if (publisher && publisher !== venue) {
          details.push(publisher);
        }
      }
      if (!details.length && fields.institution) {
        const institution = latexToUnicode(fields.institution);
        if (institution && institution !== venue) {
          details.push(institution);
        }
      }
      return {
        venue,
        details: details.join(", "),
      };
    }

    function buildPublication(entry, source) {
      const yearText = latexToUnicode(entry.fields.year || "").trim() || "Unknown";
      const match = yearText.match(/\d{4}/);
      const yearSort = match ? Number(match[0]) : -1;
      const title = latexToUnicode(entry.fields.title || "Untitled");
      const authors = parseAuthors(entry.fields.author || "");
      const venueData = buildVenue(entry.fields, source.label);
      const url = normalizeUrl(latexToUnicode(entry.fields.url || ""));
      const doiData = normalizeDoi(latexToUnicode(entry.fields.doi || ""), url);
      const arxivId =
        extractArxivId(doiData.doi) ||
        extractArxivId(doiData.doiUrl) ||
        extractArxivId(url);
      const isPublished = Boolean(collapseWhitespace(entry.fields.journal || entry.fields.booktitle));
      const isArxivPreprint = source.category === "preprint" && Boolean(arxivId) && !isPublished;
      const venue = isArxivPreprint ? "" : venueData.venue;
      const details = isArxivPreprint ? "" : venueData.details;

      const searchBlob = asciiFold(
        [
          title,
          formatAuthors(authors),
          venue,
          details,
          yearText,
          source.label,
          doiData.doi,
          latexToUnicode(entry.fields.publisher || ""),
          latexToUnicode(entry.fields.chapter || ""),
        ]
          .filter(Boolean)
          .join(" ")
      );

      return {
        key: entry.key,
        entryType: entry.entryType,
        category: source.category,
        categoryLabel: source.label,
        year: yearText,
        yearSort,
        title,
        authors,
        venue,
        details,
        url,
        doi: doiData.doi,
        doiUrl: doiData.doiUrl,
        arxivId,
        isPublished,
        bibtex: (entry.raw || "").trim(),
        searchBlob,
      };
    }

    function sortPublications(publications) {
      publications.sort((a, b) => {
        if (a.yearSort !== b.yearSort) {
          return b.yearSort - a.yearSort;
        }
        const catA = Object.hasOwn(CATEGORY_ORDER, a.category) ? CATEGORY_ORDER[a.category] : 99;
        const catB = Object.hasOwn(CATEGORY_ORDER, b.category) ? CATEGORY_ORDER[b.category] : 99;
        if (catA !== catB) {
          return catA - catB;
        }
        return asciiFold(a.title).localeCompare(asciiFold(b.title));
      });
    }

    function groupByYear(publications) {
      const grouped = new Map();
      publications.forEach((publication) => {
        if (!grouped.has(publication.year)) {
          grouped.set(publication.year, []);
        }
        grouped.get(publication.year).push(publication);
      });
      return [...grouped.entries()].sort((a, b) => {
        const yearA = (a[0].match(/\d{4}/) || ["-1"])[0];
        const yearB = (b[0].match(/\d{4}/) || ["-1"])[0];
        const numeric = Number(yearB) - Number(yearA);
        if (numeric !== 0) {
          return numeric;
        }
        return a[0].localeCompare(b[0]);
      });
    }

    function renderPublicationCard(publication) {
      const title = publication.url
        ? `<a href="${escapeHtml(publication.url)}" target="_blank" rel="noreferrer">${escapeHtml(publication.title)}</a>`
        : escapeHtml(publication.title);

      const citationParts = [];
      if (publication.venue) {
        citationParts.push(escapeHtml(publication.venue));
        if (publication.details) {
          citationParts.push(escapeHtml(publication.details));
        }
        if (publication.year && publication.year !== "Unknown") {
          citationParts.push(escapeHtml(publication.year));
        }
      } else if (publication.arxivId && !publication.isPublished) {
        const arxivLabel = `arXiv:${publication.arxivId}`;
        const arxivUrl = publication.url && /arxiv\.org\/abs\//i.test(publication.url)
          ? publication.url
          : (publication.doiUrl && /arxiv\.org\/abs\//i.test(publication.doiUrl) ? publication.doiUrl : "");
        if (arxivUrl) {
          citationParts.push(`<a href="${escapeHtml(arxivUrl)}" target="_blank" rel="noreferrer">${escapeHtml(arxivLabel)}</a>`);
        } else {
          citationParts.push(escapeHtml(arxivLabel));
        }
        if (publication.year && publication.year !== "Unknown") {
          citationParts.push(escapeHtml(publication.year));
        }
      }
      const citationLine = citationParts.length
        ? `<p class="citation-line">${citationParts.join(", ")}</p>`
        : "";
      const bibtex = publication.bibtex
        ? `
          <details class="bibtex-details">
            <summary class="bibtex-summary" title="Show BibTeX">Bib</summary>
            <div class="bibtex-box">
              <button class="copy-bibtex" type="button">Copy</button>
              <pre class="bibtex-code"><code>${escapeHtml(publication.bibtex)}</code></pre>
            </div>
          </details>
        `
        : "";

      return `
        <article class="publication-card" data-category="${escapeHtml(publication.category)}" data-year="${escapeHtml(publication.year)}" data-search="${escapeHtml(publication.searchBlob)}">
          <h3>${title}</h3>
          <p class="authors">${renderAuthors(publication.authors)}</p>
          ${citationLine}
          ${bibtex}
        </article>
      `;
    }

    function renderFilters(publications) {
      const counts = publications.reduce((acc, publication) => {
        acc[publication.category] = (acc[publication.category] || 0) + 1;
        return acc;
      }, {});
      const labels = publications.reduce((acc, publication) => {
        acc[publication.category] = publication.categoryLabel;
        return acc;
      }, {});

      const buttons = [
        `<button class="filter-chip active" type="button" data-filter="all" data-label="All">All<span>${publications.length}</span></button>`,
      ];

      Object.entries(CATEGORY_ORDER)
        .sort((a, b) => a[1] - b[1])
        .forEach(([category]) => {
          if (!counts[category]) {
            return;
          }
          buttons.push(
            `<button class="filter-chip" type="button" data-filter="${escapeHtml(category)}" data-label="${escapeHtml(labels[category])}">${escapeHtml(labels[category])}<span>${counts[category]}</span></button>`
          );
        });

      dom.filterRow.innerHTML = buttons.join("\n");
    }

    function renderSections(publications) {
      const sections = groupByYear(publications).map(([year, entries]) => {
        const cards = entries.map((entry) => renderPublicationCard(entry)).join("\n");
        return `
          <section class="year-section" data-year-section="${escapeHtml(year)}">
            <div class="year-heading">
              <h2>${escapeHtml(year)}</h2>
              <p><span data-year-count>${entries.length}</span> publication${entries.length === 1 ? "" : "s"}</p>
            </div>
            <div class="publication-grid">
              ${cards}
            </div>
          </section>
        `;
      });
      dom.root.innerHTML = sections.join("\n");
    }

    function setupBibtexCopy() {
      dom.root.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof Element)) {
          return;
        }
        const button = target.closest(".copy-bibtex");
        if (!(button instanceof HTMLButtonElement)) {
          return;
        }
        const code = button.parentElement?.querySelector("code");
        const text = code ? code.textContent || "" : "";
        if (!text.trim()) {
          return;
        }

        let copied = false;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            copied = true;
          } catch (_) {
            copied = false;
          }
        }
        if (!copied) {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();
          copied = document.execCommand("copy");
          document.body.removeChild(textarea);
        }

        const previous = button.textContent;
        button.textContent = copied ? "Copied" : "Copy failed";
        window.setTimeout(() => {
          button.textContent = previous || "Copy";
        }, 1200);
      });
    }

    function setupFilters() {
      const filterChips = Array.from(document.querySelectorAll(".filter-chip"));
      const cards = Array.from(document.querySelectorAll(".publication-card"));
      const yearSections = Array.from(document.querySelectorAll("[data-year-section]"));

      function updateFilters() {
        const query = asciiFold(state.searchQuery);
        const terms = query.split(/\s+/).filter(Boolean);
        let shown = 0;

        cards.forEach((card) => {
          const matchesCategory = state.activeFilter === "all" || card.dataset.category === state.activeFilter;
          const haystack = card.dataset.search || "";
          const matchesQuery = terms.every((term) => haystack.includes(term));
          const visible = matchesCategory && matchesQuery;
          card.hidden = !visible;
          if (visible) {
            shown += 1;
          }
        });

        yearSections.forEach((section) => {
          const yearCards = Array.from(section.querySelectorAll(".publication-card"));
          const yearShown = yearCards.filter((card) => !card.hidden).length;
          section.hidden = yearShown === 0;
          const countNode = section.querySelector("[data-year-count]");
          if (countNode) {
            countNode.textContent = String(yearShown);
          }
        });

        dom.emptyState.style.display = shown === 0 ? "block" : "none";

        const activeNode = document.querySelector(`.filter-chip[data-filter="${state.activeFilter}"]`);
        const label = state.activeFilter === "all" ? "all categories" : (activeNode?.dataset.label || state.activeFilter);

        if (!query && state.activeFilter === "all") {
          dom.statusText.textContent = `Showing all ${cards.length} publications.`;
        } else if (!query) {
          dom.statusText.textContent = `Showing ${shown} publications in ${label.toLowerCase()}.`;
        } else {
          dom.statusText.textContent = `Showing ${shown} result${shown === 1 ? "" : "s"} for "${dom.searchInput.value.trim()}" in ${label.toLowerCase()}.`;
        }
      }

      filterChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          state.activeFilter = chip.dataset.filter || "all";
          filterChips.forEach((button) => {
            button.classList.toggle("active", button === chip);
          });
          updateFilters();
        });
      });

      dom.searchInput.addEventListener("input", () => {
        state.searchQuery = dom.searchInput.value.trim();
        updateFilters();
      });

      dom.clearButton.addEventListener("click", () => {
        state.searchQuery = "";
        dom.searchInput.value = "";
        state.activeFilter = "all";
        filterChips.forEach((button) => {
          button.classList.toggle("active", button.dataset.filter === "all");
        });
        updateFilters();
        dom.searchInput.focus();
      });

      document.addEventListener("keydown", (event) => {
        const target = event.target;
        const isTyping = target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement;
        if (event.key === "/" && !isTyping) {
          event.preventDefault();
          dom.searchInput.focus();
        }
      });

      updateFilters();
    }

    async function tryFetch(path) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          return "";
        }
        return await response.text();
      } catch (_) {
        return "";
      }
    }

    async function loadBibtex() {
      const fetches = BIB_FILES.map(async (source) => {
        const text = await tryFetch(source.path);
        if (text) {
          return { source, text, mode: "fetched" };
        }

        const embeddedNode = document.getElementById(`bib-${source.id}`);
        const embeddedText = embeddedNode ? embeddedNode.textContent : "";
        if (embeddedText && embeddedText.trim()) {
          return { source, text: embeddedText, mode: "embedded" };
        }

        throw new Error(`Failed to load ${source.path} and no embedded fallback was found.`);
      });
      return Promise.all(fetches);
    }

    async function main() {
      try {
        const loaded = await loadBibtex();
        const publications = [];
        loaded.forEach(({ source, text }) => {
          const entries = parseBibtexEntries(text);
          entries.forEach((entry) => {
            publications.push(buildPublication(entry, source));
          });
        });
        sortPublications(publications);
        state.publications = publications;

        renderFilters(publications);
        renderSections(publications);
        setupBibtexCopy();

        dom.searchInput.disabled = false;
        dom.clearButton.disabled = false;
        dom.loadingState.style.display = "none";
        const fetchedCount = loaded.filter((x) => x.mode === "fetched").length;
        const embeddedCount = loaded.length - fetchedCount;
        dom.footerNote.textContent = `Generated dynamically from ${BIB_FILES.length} BibTeX files (${fetchedCount} fetched, ${embeddedCount} embedded fallback).`;
        if (embeddedCount > 0) {
          dom.sourceWarning.textContent = `Warning: not fully rendered from publications-bibtex/ (${embeddedCount} fallback source${embeddedCount === 1 ? "" : "s"} used).`;
          dom.sourceWarning.classList.add("visible");
        } else {
          dom.sourceWarning.textContent = "";
          dom.sourceWarning.classList.remove("visible");
        }
        setupFilters();
      } catch (error) {
        dom.loadingState.innerHTML = `Could not build publications dynamically: ${escapeHtml(error.message)}`;
        dom.statusText.textContent = "Loading failed.";
        dom.sourceWarning.textContent = "Warning: this page is not rendered from publications-bibtex/.";
        dom.sourceWarning.classList.add("visible");
      }
    }

    main();
  })();
</script>
</body>
</html>
